name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Code Style (phpcs PSR-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run phpcs
        run: vendor/bin/phpcs --standard=PSR12 --ignore=vendor app/

  analyse:
    name: Static Analysis (phpstan level 6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run phpstan
        run: vendor/bin/phpstan analyse app/ --level=6 --no-progress

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: monolito_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring
          coverage: xdebug

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 1
          done

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-text
        env:
          APP_ENV: testing
          JWT_SECRET: ci-test-secret-key-minimum-32-characters
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: monolito_test
          DB_USER: root
          DB_PASS: root
          LOG_CHANNEL: stderr

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ./docker/Dockerfile . -t monolito-modular:ci

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: [lint, analyse, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git tag | sort -V | tail -n 1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}

          if [ -z "$TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}